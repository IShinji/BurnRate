name: Update ccusage card

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/**/*.json'
      - 'scripts/generate-ccusage-card.mjs'
      - '.github/workflows/update-ccusage-card.yml'

permissions:
  contents: write

jobs:
  update-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate summary and SVG
        run: node scripts/generate-ccusage-card.mjs

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/ccusage-card.svg assets/ccusage-summary.json
          if git diff --cached --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git commit -m "chore: update ccusage card"
          git push
